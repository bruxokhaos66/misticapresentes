<!DOCTYPE html>
<!--
  Fixture isolada para testar a MONTAGEM do CardForm do Mercado Pago
  (v2-mercadopago-checkout.js) sem depender de rede real para
  sdk.mercadopago.com -- este ambiente de CI/sandbox não tem acesso a esse
  host (ver tests/e2e/csp-mercadopago-cardform.spec.js). Em vez disso,
  define window.MercadoPago ANTES do script real carregar: como
  carregarSdk() só injeta o <script src=SDK_URL> quando
  `!window.MercadoPago`, o mock abaixo faz o script real pular a rede
  inteiramente e seguir o mesmo caminho de código de produção
  (mpInstance.cardForm(config), autoMount, callbacks).

  Isso valida a MECÂNICA de montagem (contrato do cardForm, checagem dos 3
  iframes, remontagem duplicada) com um Chromium real -- mas NÃO substitui a
  validação final com o SDK/cartão real em sandbox (ver instruções na PR).

  Parâmetro de URL `?modo=falha` faz o mock simular onFormMounted(null) SEM
  nunca inserir os 3 iframes -- usado para testar a nova defesa que impede o
  formulário de ficar "utilizável" quando os Secure Fields não carregam.

  Réplica do bug de posicionamento (iframe com coordenadas negativas): o SDK
  real do Mercado Pago calcula o tamanho/posição de cada Secure Field UMA
  VEZ, no instante em que cardForm() é chamado, e nunca reobserva o layout
  depois. Este mock replica esse comportamento -- captura
  getBoundingClientRect() de cada campo no exato momento da chamada e usa
  esse valor "congelado" (largura/altura em px fixo, não 100%) para o
  iframe inserido depois. Se o código de produção chamar cardForm() com o
  painel ainda oculto (rect zerado), os testes abaixo devem falhar mesmo
  depois do painel ficar visível -- é isso que valida a correção em
  v2-mercadopago-checkout.js (aguardarPainelCartaoVisivel).

  Parâmetro de URL `?scrollAntes=1` adiciona um espaçador alto acima do
  formulário e faz a página abrir já rolada para longe do topo antes do
  usuário trocar para "cartão" -- usado para testar que o congelamento de
  coordenadas não é reintroduzido em páginas compridas/roladas.
-->
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fixture CardForm Mercado Pago</title>
<link rel="stylesheet" href="../../../v2-mercadopago-checkout.css" />
<style>body { font-family: sans-serif; max-width: 480px; margin: 24px auto; }
.scroll-spacer { height: 1400px; }
</style>
</head>
<body>
<div class="scroll-spacer" id="scrollSpacer" hidden></div>
<div class="payment-method-toggle" role="tablist" aria-label="Forma de pagamento">
  <button type="button" class="btn btn-ghost payment-method-btn is-active" data-payment-method="pix" role="tab" aria-selected="true">Pix</button>
  <button type="button" class="btn btn-ghost payment-method-btn" data-payment-method="cartao" role="tab" aria-selected="false" hidden data-mp-toggle>Cartão de crédito</button>
</div>
<div class="form-panel pix-panel" id="pixPaymentPanel"></div>
<div class="form-panel card-panel" id="cardPaymentPanel" hidden>
  <form id="mpCardForm" class="form" novalidate>
    <label>Número do cartão<div id="mpCardNumber" class="mp-secure-field"></div></label>
    <div class="mp-card-row">
      <label>Validade<div id="mpExpirationDate" class="mp-secure-field"></div></label>
      <label>CVV<div id="mpSecurityCode" class="mp-secure-field"></div></label>
    </div>
    <label>Nome impresso no cartão<input id="mpCardholderName" type="text" required /></label>
    <div class="mp-card-row">
      <label>CPF do titular<input id="mpDocNumber" type="text" required /></label>
      <label>Parcelas<select id="mpInstallments" required aria-describedby="mpInstallmentsNote"></select></label>
    </div>
    <label>E-mail para confirmação<input id="mpCardEmail" type="email" required /></label>
    <select id="mpIssuer" hidden></select>
    <select id="mpIdentificationType" hidden><option value="CPF" selected>CPF</option></select>
    <p id="mpInstallmentsNote" role="status" aria-live="polite"></p>
    <p id="mpCardStatus" aria-live="polite"></p>
    <button class="btn btn-full" type="submit" id="mpCardSubmit">Pagar com cartão</button>
  </form>
</div>
<script>
  window.misticaSiteConfig = { apiBaseUrl: "https://api.example.invalid" };
  window.misticaGetCart = () => [{ id: "produto-teste", qty: 1 }];
  window.misticaCriarPedido = async () => ({ id: 999, pixTxid: "txid-teste", totalFinal: 150.5 });

  var params = new URLSearchParams(location.search);
  var modoFalha = params.get("modo") === "falha";
  if (params.get("scrollAntes") === "1") {
    document.getElementById("scrollSpacer").hidden = false;
  }
  window.__mpMountCount = 0;
  window.__mpConfigsCapturados = [];
  window.__mpConstructorOptionsCapturadas = [];

  var CAMPOS_SEGUROS = ["mpCardNumber", "mpExpirationDate", "mpSecurityCode"];

  function MockMercadoPago(publicKey, options) {
    window.__mpConstructorOptionsCapturadas.push(options);
  }
  MockMercadoPago.prototype.cardForm = function (config) {
    window.__mpConfigsCapturados.push(config);
    window.__mpMountCount += 1;

    // Congela a geometria de cada campo AGORA, no instante da chamada --
    // exatamente como o SDK real faz. Se o container ainda estiver oculto
    // (display:none via `hidden`), o rect vem zerado e o iframe nasce 0x0,
    // reproduzindo o bug relatado mesmo que o painel fique visível depois.
    var geometriaCongelada = {};
    CAMPOS_SEGUROS.forEach(function (id) {
      var el = document.getElementById(id);
      geometriaCongelada[id] = el ? el.getBoundingClientRect() : null;
    });

    if (config.autoMount) {
      setTimeout(function () {
        if (!modoFalha) {
          CAMPOS_SEGUROS.forEach(function (id) {
            var el = document.getElementById(id);
            var rect = geometriaCongelada[id];
            if (el && el.querySelectorAll("iframe").length === 0 && rect) {
              var iframe = document.createElement("iframe");
              iframe.src = "about:blank";
              iframe.style.display = "block";
              iframe.style.border = "0";
              iframe.style.width = rect.width + "px";
              iframe.style.height = rect.height + "px";
              el.appendChild(iframe);
            }
          });
          if (config.callbacks && config.callbacks.onBinChange) {
            config.callbacks.onBinChange("411111");
          }
          if (config.callbacks && config.callbacks.onPaymentMethodsReceived) {
            // Formato real (mercadopago/sdk-js, docs/card-form.md):
            // { paging, results: [...] } -- nunca um array solto.
            config.callbacks.onPaymentMethodsReceived(null, { paging: { total: 1 }, results: [{ id: "visa" }] });
          }
          var installments = document.getElementById("mpInstallments");
          if (installments) {
            // Réplica do comportamento real do SDK: ele mesmo limpa/preenche
            // o <select> de parcelas (fluxo oficial do CardForm) antes de
            // disparar onInstallmentsReceived.
            installments.innerHTML = "";
            var opt = document.createElement("option");
            opt.value = "1";
            opt.textContent = "1x sem juros";
            installments.appendChild(opt);
          }
          if (config.callbacks && config.callbacks.onInstallmentsReceived) {
            // Formato real: { merchant_account_id?, payer_costs: [...] }.
            config.callbacks.onInstallmentsReceived(null, { payer_costs: [{ installments: "1" }] });
          }
        }
        if (config.callbacks && config.callbacks.onFormMounted) config.callbacks.onFormMounted(null);
      }, 20);
    }
    return {
      unmount: function () {
        CAMPOS_SEGUROS.forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.querySelectorAll("iframe").forEach(function (f) { f.remove(); });
        });
      },
      getCardFormData: function () {
        return {
          token: "mock-token",
          paymentMethodId: "visa",
          installments: 1,
          issuerId: "1",
          cardholderEmail: "teste@example.invalid",
          identificationType: "CPF",
          identificationNumber: "12345678900",
        };
      },
    };
  };
  window.MercadoPago = MockMercadoPago;
</script>
<script src="../../../v2-mercadopago-checkout.js"></script>
</body>
</html>
