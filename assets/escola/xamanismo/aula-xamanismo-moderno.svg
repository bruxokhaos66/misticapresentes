<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="a3Titulo a3Desc">
  <title id="a3Titulo">Como o xamanismo chegou ao mundo moderno</title>
  <desc id="a3Desc">Ilustração cinematográfica em composição dividida: à esquerda, uma floresta ancestral em silhueta ao entardecer; à direita, estantes de biblioteca desfocadas sob luz quente de leitura; um caminho de luz dourada suave une as duas metades no horizonte, sem pessoas.</desc>
  <defs>
    <linearGradient id="ceuModerno" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b1a16"/>
      <stop offset="46%" stop-color="#101a1c"/>
      <stop offset="56%" stop-color="#221a10"/>
      <stop offset="100%" stop-color="#3a2a14"/>
    </linearGradient>
    <radialGradient id="lampModerno" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd987" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#f2c96d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f2c96d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="florestaFundoM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2c1c"/>
      <stop offset="100%" stop-color="#0a120a"/>
    </linearGradient>
    <linearGradient id="florestaMeioM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101c10"/>
      <stop offset="100%" stop-color="#060a06"/>
    </linearGradient>
    <filter id="desfoqueEstante" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
    <filter id="desfoqueCaminho" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#ceuModerno)"/>
  <g fill="#f7ecc9" opacity="0.4">
    <circle cx="70" cy="70" r="1.2"/><circle cx="160" cy="120" r="1"/><circle cx="260" cy="60" r="1.4"/>
    <circle cx="340" cy="100" r="1"/>
  </g>
  <path d="M0,630 L0,380 Q90,320 190,370 Q290,300 390,365 L560,365 L560,630 Z" fill="url(#florestaFundoM)"/>
  <path d="M0,630 L0,460 Q100,400 210,455 Q320,390 430,450 L560,450 L560,630 Z" fill="url(#florestaMeioM)"/>
  <path d="M0,630 L0,540 Q110,485 230,535 Q350,475 460,530 L560,530 L560,630 Z" fill="#050907"/>
  <g filter="url(#desfoqueEstante)" fill="#3a2a16" opacity="0.85">
    <rect x="700" y="330" width="90" height="230"/>
    <rect x="810" y="280" width="90" height="280"/>
    <rect x="920" y="350" width="80" height="210"/>
    <rect x="1020" y="300" width="90" height="260"/>
    <rect x="1130" y="340" width="70" height="220"/>
  </g>
  <g filter="url(#desfoqueEstante)" fill="#f2c96d" opacity="0.5">
    <rect x="712" y="350" width="66" height="10"/><rect x="712" y="400" width="66" height="10"/>
    <rect x="822" y="310" width="66" height="10"/><rect x="822" y="370" width="66" height="10"/>
    <rect x="932" y="380" width="56" height="10"/><rect x="932" y="430" width="56" height="10"/>
    <rect x="1032" y="330" width="66" height="10"/><rect x="1032" y="400" width="66" height="10"/>
  </g>
  <circle cx="880" cy="330" r="180" fill="url(#lampModerno)"/>
  <path d="M120,555 Q450,470 700,455 Q900,445 1090,555" stroke="#f2c96d" stroke-width="10" fill="none" opacity="0.25" filter="url(#desfoqueCaminho)" stroke-linecap="round"/>
  <path d="M120,555 Q450,470 700,455 Q900,445 1090,555" stroke="#f2c96d" stroke-width="3" fill="none" opacity="0.8" stroke-dasharray="2 15" stroke-linecap="round"/>
  <rect x="0" y="560" width="1200" height="70" fill="#04060a" opacity="0.35"/>
</svg>
