<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="a2Titulo a2Desc">
  <title id="a2Titulo">Aula 2 — Tradições semelhantes em diferentes regiões</title>
  <desc id="a2Desc">Ilustração abstrata de um globo estilizado com pontos luminosos em diferentes regiões, simbolizando práticas rituais distintas ao redor do mundo, sem símbolos de povos específicos.</desc>
  <defs>
    <radialGradient id="globoA2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a2a1e"/>
      <stop offset="100%" stop-color="#07070b"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#030305"/>
  <g fill="#f0c56a" opacity="0.6">
    <circle cx="90" cy="80" r="1.3"/><circle cx="220" cy="130" r="1.6"/><circle cx="1000" cy="90" r="1.4"/>
    <circle cx="1120" cy="150" r="1.2"/><circle cx="150" cy="500" r="1.3"/><circle cx="1080" cy="520" r="1.5"/>
  </g>
  <circle cx="600" cy="320" r="230" fill="url(#globoA2)" stroke="#536b37" stroke-width="2"/>
  <g stroke="#536b37" stroke-width="1" fill="none" opacity="0.55">
    <ellipse cx="600" cy="320" rx="230" ry="90"/>
    <ellipse cx="600" cy="320" rx="230" ry="150"/>
    <line x1="370" y1="320" x2="830" y2="320"/>
    <line x1="600" y1="90" x2="600" y2="550"/>
  </g>
  <g fill="#f0c56a">
    <circle cx="470" cy="250" r="7"/>
    <circle cx="520" cy="410" r="7"/>
    <circle cx="700" cy="230" r="7"/>
    <circle cx="760" cy="380" r="7"/>
    <circle cx="600" cy="200" r="7"/>
    <circle cx="640" cy="440" r="7"/>
  </g>
  <text x="60" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#efe1c5">Aula 2 · Tradições em diferentes regiões</text>
  <text x="60" y="590" font-family="Georgia, serif" font-size="17" fill="#d8cbb6">Semelhança não é identidade — cada ponto representa um contexto cultural próprio.</text>
</svg>
