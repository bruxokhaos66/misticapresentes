  <title id="a1Titulo">A origem da palavra "xamã"</title>
  <desc id="a1Desc">Ilustração cinematográfica de uma taiga siberiana nevada ao entardecer de inverno, com camadas de abetos escuros em silhueta, um sol baixo e pálido no horizonte e um céu que passa de azul profundo a dourado, sem pessoas.</desc>
