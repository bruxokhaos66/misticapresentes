      <stop offset="40%" stop-color="#f2c96d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f2c96d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="taigaFundo" x1="0" y1="0" x2="0" y2="1">
