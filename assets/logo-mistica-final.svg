<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Logo Mística Presentes</title>
  <desc id="desc">Símbolo místico com lua, folha, estrela e aura dourada para a marca Mística Presentes.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="68%">
      <stop offset="0" stop-color="#26351c"/>
      <stop offset="0.44" stop-color="#10150e"/>
      <stop offset="1" stop-color="#030305"/>
    </radialGradient>
    <linearGradient id="gold" x1="19%" y1="10%" x2="82%" y2="88%">
      <stop offset="0" stop-color="#fff1bd"/>
      <stop offset="0.5" stop-color="#f0c56a"/>
      <stop offset="1" stop-color="#a97826"/>
    </linearGradient>
    <linearGradient id="sage" x1="18%" y1="20%" x2="82%" y2="78%">
      <stop offset="0" stop-color="#d8e7a2"/>
      <stop offset="1" stop-color="#536b37"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
