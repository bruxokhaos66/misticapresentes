  <path d="M390 260c50 24 81 67 92 130-65-4-112-31-142-79 16-22 32-39 50-51Z" fill="url(#sage)" opacity=".92"/>
  <path d="M343 322c45 10 85 34 121 71" fill="none" stroke="#fff1bd" stroke-opacity=".62" stroke-width="7" stroke-linecap="round"/>
  <path d="M452 144l16 42 42 16-42 16-16 42-16-42-42-16 42-16 16-42Z" fill="#ffd987" opacity=".96"/>
