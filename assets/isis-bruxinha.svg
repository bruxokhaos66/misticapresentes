<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-labelledby="title desc">
  <title id="title">Isis, assistente virtual da Mística Presentes</title>
  <desc id="desc">Arte publicitária da Isis com aparência humana, moderna, xamânica e premium, em tons de roxo escuro, dourado e verde-musgo.</desc>
  <defs>
