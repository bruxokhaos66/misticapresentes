name: Verificacao temporaria de deploy
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checar rota /api/alunos/me
        run: |
          echo "--- /api/health ---"
          curl -sS -m 20 -w "\nHTTP %{http_code}\n" https://api.misticaesotericos.com.br/api/health || true
          echo "--- /api/alunos/me ---"
          curl -sS -m 20 -w "\nHTTP %{http_code}\n" https://api.misticaesotericos.com.br/api/alunos/me || true
          echo "--- /api/checkout/cursos (sem chave, deve dar 401) ---"
          curl -sS -m 20 -w "\nHTTP %{http_code}\n" https://api.misticaesotericos.com.br/api/checkout/cursos || true
