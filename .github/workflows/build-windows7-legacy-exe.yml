name: Build Windows 7 Legacy EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "requirements-windows7.txt"
      - ".github/workflows/build-windows7-legacy-exe.yml"

jobs:
  build-windows7-legacy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.8 legacy
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: "x64"

      - name: Install legacy dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows7.txt

      - name: Build Windows 7 compatible executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "MisticaPresentes-Windows7" `
            --add-data "config.py;." `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "isis;isis" `
            --add-data "assets;assets" `
            --add-data "docs;docs" `
            app.py

      - name: Package Windows 7 executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-windows7
          Copy-Item "dist\MisticaPresentes-Windows7.exe" "release-windows7\MisticaPresentes-Windows7.exe"
          @"
          Mística Presentes - Versão Legacy Windows 7

          Esta versão foi gerada com Python 3.8 e PyInstaller Legacy.

          Recomendado para:
          - Windows 7 64 bits
          - Windows 8/8.1
          - PCs antigos

          Se não abrir no Windows 7, instale o Microsoft Visual C++ Redistributable 2015-2019 x64.

          Observação:
          A versão Windows 10/11 continua sendo a principal. Use esta apenas em computador antigo.
          "@ | Out-File -FilePath "release-windows7\LEIA-ME-WINDOWS7.txt" -Encoding utf8
          Compress-Archive -Path "release-windows7\*" -DestinationPath "MisticaPresentes-Windows7-Legacy.zip" -Force

      - name: Upload Windows 7 legacy artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPresentes-Windows7-Legacy
          path: MisticaPresentes-Windows7-Legacy.zip
          retention-days: 14
