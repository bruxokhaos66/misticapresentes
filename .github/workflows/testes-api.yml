name: Testes da API

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pytest:
    name: Rodar testes Python
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validar regras novas de encomenda
        id: preorder_tests
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_product_preorder_rules.py -q --tb=long --disable-warnings > pytest-preorder.log 2>&1
          status=$?
          cat pytest-preorder.log
          exit "$status"

      - name: Publicar log de encomenda em caso de falha
        if: failure() && steps.preorder_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-preorder-log
          path: pytest-preorder.log
          if-no-files-found: error
          retention-days: 3

      - name: Rodar suite completa
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=line --disable-warnings > pytest.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 60 pytest.log
            exit "$status"
          fi
          tail -n 20 pytest.log
