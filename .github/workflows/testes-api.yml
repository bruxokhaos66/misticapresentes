name: Testes da API

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pytest:
    name: Rodar testes Python
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validar regras novas de encomenda
        run: |
          python -m pytest tests/test_product_preorder_rules.py -q --tb=short --disable-warnings

      - name: Rodar suite completa
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=line --disable-warnings > pytest.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 60 pytest.log
            exit "$status"
          fi
          tail -n 20 pytest.log
