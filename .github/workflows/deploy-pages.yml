name: Publicar site no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Validar arquivos essenciais da raiz
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f app.js
          test -f v2.css
          test -f sitemap.xml
          test -f robots.txt
          test -f CNAME
          test -f mistica-v2/index.html
          ! grep -qi 'noindex' index.html
          ! grep -q 'mistica-v2/' index.html
          grep -q 'www.misticaesotericos.com.br' CNAME
          grep -q 'noindex,follow' mistica-v2/index.html
          grep -q 'url=/' mistica-v2/index.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  publicar:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validar
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
