name: Publicar site no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Validar arquivos essenciais da raiz
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f app.js
          test -f v2.css
          test -f sitemap.xml
          test -f robots.txt
          test -f CNAME
          test -f mistica-v2/index.html
          test -f admin.html
          test -f painel-auth.js
          test -f admin-api-login-bootstrap.js
          test -f deploy-version.txt
          ! grep -qi 'noindex' index.html
          ! grep -q 'mistica-v2/' index.html
          grep -q 'www.misticaesotericos.com.br' CNAME
          grep -q 'noindex,follow' mistica-v2/index.html
          grep -q 'url=/' mistica-v2/index.html
          grep -q '/api/auth/login' painel-auth.js
          grep -q 'admin-api-login-bootstrap' site-config.js
          grep -q '20260710-admin-pages-check' deploy-version.txt

      - name: Exibir versão publicada
        run: cat deploy-version.txt

      - name: Remover código-fonte não público antes de publicar
        shell: bash
        run: |
          set -euo pipefail
          # O checkout inclui backend, app desktop e ferramentas internas que
          # nunca devem ir para o artefato público do GitHub Pages. Note que
          # updates/, app-update.json e mistica-painel-config.json ficam de
          # fora desta lista de propósito: o app desktop os busca via HTTP no
          # domínio público.
          rm -rf .git .github api backend cloud_server database docs installer \
            isis mobile_android reports repositories screens services scripts tools tests
          find . -maxdepth 1 -type f \( -name '*.py' -o -name '*.bat' \) -delete
          rm -f .env.example .gitignore .lighthouserc.json .secrets.baseline \
            CHECKLIST_V2.md README.md STATUS_ATUAL.md render.yaml \
            requirements.txt requirements-win7-32.txt requirements-win7-x86.txt \
            requirements-windows7.txt package.json package-lock.json playwright.config.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  publicar:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validar
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
