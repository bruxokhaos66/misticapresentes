name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/build-windows-exe.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate online update package
        shell: pwsh
        run: |
          python scripts/gerar_pacote_atualizacao.py 1.0.${{ github.run_number }}

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "MisticaPresentes" `
            --add-data "config.py;." `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "isis;isis" `
            --add-data "assets;assets" `
            --add-data "docs;docs" `
            app.py

      - name: Publish update package to site
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updates
          Copy-Item "dist\updates\manifest.json" "updates\manifest.json" -Force
          Copy-Item "dist\updates\mistica-update-*.zip" "updates\" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates app_version.py
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Publish online update package"
            git push
          }

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "dist\MisticaPresentes.exe" "release\MisticaPresentes.exe"
          Compress-Archive -Path "release\MisticaPresentes.exe" -DestinationPath "MisticaPresentes-Windows.zip" -Force
          Compress-Archive -Path "dist\updates\*" -DestinationPath "MisticaPresentes-Updates.zip" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPresentes-Windows-exe
          path: MisticaPresentes-Windows.zip
          retention-days: 14

      - name: Upload update package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPresentes-Updates
          path: MisticaPresentes-Updates.zip
          retention-days: 14
