name: Build Mistica Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "MisticaLauncher.py"
      - "auto_updater.py"
      - "app_version.py"
      - "app_*.py"
      - "mistica_presentes.py"
      - "requirements.txt"
      - ".github/workflows/build-launcher.yml"

jobs:
  build-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build launcher executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "MisticaLauncher" `
            --add-data "auto_updater.py;." `
            --add-data "app_version.py;." `
            --add-data "app_runtime_patch.py;." `
            --add-data "app_pagamento_misto_patch.py;." `
            --add-data "app_sync_pagamento_misto_payload_patch.py;." `
            --add-data "app_caixa_fechamento_avancado_patch.py;." `
            --add-data "app_backup_inicializacao_patch.py;." `
            --add-data "app_sync_status_patch.py;." `
            --add-data "app_painel_guard_patch.py;." `
            --add-data "app_scroll_patch.py;." `
            --add-data "config.py;." `
            --add-data "mistica_presentes.py;." `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "isis;isis" `
            --add-data "assets;assets" `
            MisticaLauncher.py

      - name: Package launcher
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-launcher
          Copy-Item "dist\MisticaLauncher.exe" "release-launcher\MisticaLauncher.exe"
          @"
          Mística Presentes - Launcher

          Use este arquivo para abrir o sistema.

          Ele verifica atualizações online antes do login, mostra barra de progresso e abre a versão mais nova disponível.

          Se não houver internet, abre a versão local normalmente.
          "@ | Out-File -FilePath "release-launcher\LEIA-ME-LAUNCHER.txt" -Encoding utf8
          Compress-Archive -Path "release-launcher\*" -DestinationPath "MisticaLauncher-Windows.zip" -Force

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisticaLauncher-Windows
          path: MisticaLauncher-Windows.zip
          retention-days: 14
