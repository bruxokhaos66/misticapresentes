name: Build Mistica Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "MisticaLauncher.py"
      - "auto_updater.py"
      - "app_version.py"
      - "release_notes.py"
      - "app_*.py"
      - "mistica_presentes.py"
      - "services/**"
      - "repositories/**"
      - "database/**"
      - "reports/**"
      - "assets/**"
      - "scripts/auditoria_imports_runtime.py"
      - "scripts/gerar_icone_mistica.py"
      - "requirements.txt"
      - ".github/workflows/build-launcher.yml"

jobs:
  build-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pillow
          python -c "import sqlite3, webbrowser, random; print('stdlib ok:', sqlite3.sqlite_version)"

      - name: Generate shamanic icon
        shell: pwsh
        run: |
          python scripts/gerar_icone_mistica.py

      - name: Audit runtime imports
        shell: pwsh
        run: |
          python scripts/auditoria_imports_runtime.py

      - name: Build launcher executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "MisticaLauncher" `
            --icon "assets\mistica_xamanico_moderno.ico" `
            --hidden-import sqlite3 `
            --hidden-import _sqlite3 `
            --hidden-import webbrowser `
            --hidden-import random `
            --hidden-import json `
            --hidden-import pathlib `
            --hidden-import threading `
            --hidden-import queue `
            --hidden-import time `
            --hidden-import datetime `
            --hidden-import urllib `
            --hidden-import urllib.request `
            --hidden-import zipfile `
            --hidden-import hashlib `
            --hidden-import tempfile `
            --hidden-import shutil `
            --hidden-import platform `
            --hidden-import struct `
            --hidden-import reports `
            --collect-submodules sqlite3 `
            --collect-submodules reports `
            --add-data "auto_updater.py;." `
            --add-data "app_version.py;." `
            --add-data "release_notes.py;." `
            --add-data "app_runtime_patch.py;." `
            --add-data "app_pagamento_misto_patch.py;." `
            --add-data "app_sync_pagamento_misto_payload_patch.py;." `
            --add-data "app_caixa_fechamento_avancado_patch.py;." `
            --add-data "app_backup_inicializacao_patch.py;." `
            --add-data "app_backup_painel_patch.py;." `
            --add-data "app_manutencao_segura_patch.py;." `
            --add-data "app_sync_status_patch.py;." `
            --add-data "app_painel_guard_patch.py;." `
            --add-data "app_scroll_patch.py;." `
            --add-data "config.py;." `
            --add-data "mistica_presentes.py;." `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "isis;isis" `
            --add-data "reports;reports" `
            --add-data "assets;assets" `
            MisticaLauncher.py

      - name: Package launcher
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-launcher
          Copy-Item "dist\MisticaLauncher.exe" "release-launcher\MisticaLauncher.exe"
          Copy-Item "assets\mistica_xamanico_moderno.ico" "release-launcher\mistica_xamanico_moderno.ico" -Force
          @"
          Mística Presentes - Launcher

          Use este arquivo para abrir o sistema.

          Ele verifica atualizações online antes do login, mostra barra de progresso e abre a versão mais nova disponível.

          Se não houver internet, abre a versão local normalmente.
          "@ | Out-File -FilePath "release-launcher\LEIA-ME-LAUNCHER.txt" -Encoding utf8
          Compress-Archive -Path "release-launcher\*" -DestinationPath "MisticaLauncher-Windows.zip" -Force

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisticaLauncher-Windows
          path: MisticaLauncher-Windows.zip
          retention-days: 14
