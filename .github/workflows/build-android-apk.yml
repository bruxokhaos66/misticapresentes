name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile_android/**'
      - '.github/workflows/build-android-apk.yml'
  push:
    branches: [ main ]
    paths:
      - 'mobile_android/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_android
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile_android/**/*.gradle*', 'mobile_android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Dar permissao de execucao ao wrapper
        run: chmod +x ./gradlew

      # A build local e a do CI usam exatamente a mesma versao do Gradle,
      # sempre via wrapper (nunca uma instalacao de Gradle separada que
      # ignore o mobile_android/gradle/wrapper/gradle-wrapper.properties).
      - name: Lint (todas as variantes)
        run: ./gradlew lint --no-daemon

      # Com flavorDimensions, "testDebugUnitTest"/"assembleDebug" sao
      # ambiguos para o Gradle (ele nao infere as 3 variantes sozinho) -
      # entao listamos as 3 variantes explicitamente, uma por flavor.
      #
      # --continue (temporario, so para esta investigacao): deixa rodar as
      # 3 flavors mesmo se uma falhar, para diagnosticar as 3 de uma vez em
      # vez de precisar de uma rodada de CI por flavor.
      - name: Testes unitarios (dev/homolog/prod, build type debug)
        run: ./gradlew testDevDebugUnitTest testHomologDebugUnitTest testProdDebugUnitTest --no-daemon --continue

      # Instrumentacao TEMPORARIA de diagnostico (investigacao das 15
      # falhas reveladas apos a correcao do livelock) -- so imprime os XMLs
      # de resultado de teste (stack trace completo) se a etapa acima
      # falhou. Remover assim que a causa raiz for confirmada.
      - name: Diagnostico de falhas de teste (instrumentacao temporaria)
        if: failure()
        run: |
          for f in app/build/test-results/test*UnitTest/TEST-*.xml; do
            if grep -q '<failure\|<error' "$f" 2>/dev/null; then
              echo "::group::$f"
              cat "$f"
              echo "::endgroup::"
            fi
          done

      - name: Gerar APKs debug (dev/homolog/prod)
        run: ./gradlew assembleDevDebug assembleHomologDebug assembleProdDebug --no-daemon

      - name: Publicar relatorios de lint e teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-relatorios
          path: |
            mobile_android/app/build/reports/lint-results-*.html
            mobile_android/app/build/test-results/**
            mobile_android/app/build/reports/tests/**

      # Somente artefatos de DEBUG sao publicados. Nenhum APK de release e
      # gerado, assinado ou publicado por este workflow.
      - name: Publicar APK debug (dev)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-dev-debug
          path: mobile_android/app/build/outputs/apk/dev/debug/app-dev-debug.apk

      - name: Publicar APK debug (homolog)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-homolog-debug
          path: mobile_android/app/build/outputs/apk/homolog/debug/app-homolog-debug.apk

      - name: Publicar APK debug (prod)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-prod-debug
          path: mobile_android/app/build/outputs/apk/prod/debug/app-prod-debug.apk

# O scan de segredos deste diretório já é coberto pelo workflow
# `security-secrets.yml` (detect-secrets), que roda sem filtro de path em
# todo push/PR e portanto também cobre mobile_android/** — não duplicado aqui.
