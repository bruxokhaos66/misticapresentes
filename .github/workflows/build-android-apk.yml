name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile_android/**'
      - '.github/workflows/build-android-apk.yml'
  push:
    branches: [ main ]
    paths:
      - 'mobile_android/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_android
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile_android/**/*.gradle*', 'mobile_android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Dar permissao de execucao ao wrapper
        run: chmod +x ./gradlew

      # A build local e a do CI usam exatamente a mesma versao do Gradle,
      # sempre via wrapper (nunca uma instalacao de Gradle separada que
      # ignore o mobile_android/gradle/wrapper/gradle-wrapper.properties).
      - name: Lint (todas as variantes)
        run: ./gradlew lint --no-daemon

      - name: Testes unitarios (build type debug)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Gerar APKs debug (dev/homolog/prod)
        run: ./gradlew assembleDebug --no-daemon

      - name: Publicar relatorios de lint e teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-relatorios
          path: |
            mobile_android/app/build/reports/lint-results-*.html
            mobile_android/app/build/test-results/**
            mobile_android/app/build/reports/tests/**

      # Somente artefatos de DEBUG sao publicados. Nenhum APK de release e
      # gerado, assinado ou publicado por este workflow.
      - name: Publicar APK debug (dev)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-dev-debug
          path: mobile_android/app/build/outputs/apk/dev/debug/app-dev-debug.apk

      - name: Publicar APK debug (homolog)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-homolog-debug
          path: mobile_android/app/build/outputs/apk/homolog/debug/app-homolog-debug.apk

      - name: Publicar APK debug (prod)
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPainel-Android-prod-debug
          path: mobile_android/app/build/outputs/apk/prod/debug/app-prod-debug.apk

# O scan de segredos deste diretório já é coberto pelo workflow
# `security-secrets.yml` (detect-secrets), que roda sem filtro de path em
# todo push/PR e portanto também cobre mobile_android/** — não duplicado aqui.
