name: Healthcheck da API

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  healthcheck:
    name: Checar /api/health/ready
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/health/ready
        id: check
        env:
          MISTICA_API_URL: ${{ vars.MISTICA_API_URL || 'https://api.misticaesotericos.com.br' }}
        run: |
          set +e
          status=$(curl -fsS -m 15 -o /tmp/health.json -w "%{http_code}" "${MISTICA_API_URL}/api/health/ready")
          code=$?
          echo "http_status=${status}" >> "$GITHUB_OUTPUT"
          if [ $code -ne 0 ] || [ "$status" != "200" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir issue se a API estiver fora do ar
        if: steps.check.outputs.ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔴 API fora do ar";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "healthcheck",
            });
            const existing = issues.find(issue => issue.title === title);
            const body = `A checagem automática de \`/api/health/ready\` falhou (status HTTP: ${{ steps.check.outputs.http_status }}) em ${new Date().toISOString()}. Isso indica banco inacessível/não gravável, migrations pendentes ou disco persistente indisponível -- não só o processo parado.\n\nVeja docs/admin/BACKUP_MONITORAMENTO_DEPLOY.md e docs/GO_LIVE_RUNBOOK_FASE_C.md para o passo a passo de diagnóstico/rollback.`;
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["healthcheck"],
              });
            }

      - name: Fechar issue se a API voltou a responder
        if: steps.check.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔴 API fora do ar";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "healthcheck",
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `API voltou a responder normalmente em ${new Date().toISOString()}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed",
              });
            }
