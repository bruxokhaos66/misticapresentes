name: Build Win7 x86 EXE

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app.py'
      - 'mistica_presentes.py'
      - 'isis/**'
      - 'database/**'
      - 'repositories/**'
      - 'services/**'
      - 'assets/**'
      - 'requirements-win7-x86.txt'
      - 'build_win7_x86.bat'
      - '.github/workflows/build-win7-x86.yml'

jobs:
  build-win7-x86:
    name: Gerar MisticaPresentes-Win7-x86.exe
    runs-on: windows-2022

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Confirmar Python 32 bits e SQLite
        shell: pwsh
        run: |
          python --version
          python -c "import struct, sqlite3; print('Arquitetura Python:', struct.calcsize('P')*8, 'bits'); print('SQLite:', sqlite3.sqlite_version); raise SystemExit(0 if struct.calcsize('P')*8 == 32 else 1)"

      - name: Instalar dependencias
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25" setuptools wheel
          python -m pip install -r requirements-win7-x86.txt

      - name: Gerar executavel Win7 x86
        shell: pwsh
        run: |
          $pythonPrefix = python -c "import sys; print(sys.base_prefix)"
          $dllDir = Join-Path $pythonPrefix "DLLs"
          $sqlitePyd = Join-Path $dllDir "_sqlite3.pyd"
          $sqliteDll = Join-Path $dllDir "sqlite3.dll"
          if (!(Test-Path $sqlitePyd)) { throw "_sqlite3.pyd missing in $dllDir" }
          if (!(Test-Path $sqliteDll)) { throw "sqlite3.dll missing in $dllDir" }

          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "MisticaPresentes-Win7-x86" `
            --hidden-import=sqlite3 `
            --hidden-import=_sqlite3 `
            --hidden-import=isis `
            --hidden-import=isis.memory `
            --hidden-import=repositories `
            --hidden-import=services `
            --hidden-import=services.isis_service `
            --hidden-import=customtkinter `
            --hidden-import=PIL._tkinter_finder `
            --hidden-import=pyttsx3.drivers `
            --hidden-import=pyttsx3.drivers.sapi5 `
            --collect-submodules=sqlite3 `
            --collect-all=isis `
            --collect-submodules=isis `
            --collect-submodules=repositories `
            --collect-submodules=services `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "assets;assets" `
            --add-data "mistica_presentes.py;." `
            --add-data "config.py;." `
            --add-data "app_version.py;." `
            --add-data "auto_updater.py;." `
            --add-binary "$sqlitePyd;." `
            --add-binary "$sqliteDll;." `
            app.py

          if (!(Test-Path "dist\MisticaPresentes-Win7-x86.exe")) {
            Get-ChildItem -Recurse dist -ErrorAction SilentlyContinue
            throw "EXE nao foi gerado."
          }

      - name: Enviar EXE como artefato
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPresentes-Win7-x86
          path: dist/MisticaPresentes-Win7-x86.exe
          if-no-files-found: error
