name: Build Win7 x86 EXE

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app.py'
      - 'mistica_presentes.py'
      - 'isis/**'
      - 'services/**'
      - 'requirements-win7-x86.txt'
      - 'build_win7_x86.bat'
      - '.github/workflows/build-win7-x86.yml'

jobs:
  build-win7-x86:
    name: Gerar MisticaPresentes-Win7-x86.exe
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Confirmar Python 32 bits
        shell: cmd
        run: |
          python --version
          python -c "import struct; print('Arquitetura Python:', struct.calcsize('P')*8, 'bits'); raise SystemExit(0 if struct.calcsize('P')*8 == 32 else 1)"

      - name: Instalar dependencias
        shell: cmd
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-win7-x86.txt

      - name: Gerar executavel Win7 x86
        shell: cmd
        run: |
          python -m PyInstaller ^
            --onefile ^
            --windowed ^
            --name "MisticaPresentes-Win7-x86" ^
            --hidden-import=isis ^
            --hidden-import=isis.memory ^
            --hidden-import=services.isis_service ^
            --collect-all isis ^
            --collect-submodules isis ^
            --collect-submodules services ^
            app.py

      - name: Enviar EXE como artefato
        uses: actions/upload-artifact@v4
        with:
          name: MisticaPresentes-Win7-x86
          path: dist/MisticaPresentes-Win7-x86.exe
          if-no-files-found: error
