name: Segurança - segredos (detect-secrets)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: Checar segredos novos no código
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar detect-secrets (versão fixada)
        run: python -m pip install --upgrade pip && python -m pip install detect-secrets==1.5.0

      - name: Escanear repositório contra a baseline revisada
        run: |
          set -euo pipefail
          detect-secrets scan --baseline .secrets.baseline
          if ! git diff --exit-code -I'"generated_at"' -- .secrets.baseline; then
            echo "::error::detect-secrets encontrou possíveis segredos novos que ainda não foram revisados na baseline."
            echo "Rode 'detect-secrets audit .secrets.baseline' localmente, classifique cada achado (nunca cole o valor real em commits/PRs) e commite a baseline revisada."
            git checkout -- .secrets.baseline
            exit 1
          fi
          echo "Nenhum segredo novo encontrado fora da baseline revisada."
