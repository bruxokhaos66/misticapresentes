name: Build Instalador Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  APP_VERSION: 1.1.${{ github.run_number }}
  APP_BUILD: ${{ github.run_number }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt python -m pip install -r requirements.txt
          python -m pip install pyinstaller fastapi uvicorn customtkinter Pillow ddgs httpx SpeechRecognition pyttsx3

      - name: Gerar programa principal
        run: |
          python -m PyInstaller --noconfirm MisticaPresentes_CORRETO.spec

      - name: Gerar servidor do aplicativo
        run: |
          python -m PyInstaller --noconfirm --onedir --console --name ServidorMisticaApp --add-data "backend;backend" --add-data "database;database" --add-data "services;services" --add-data "config.py;." servidor_app.py

      - name: Montar pacote instalador
        shell: pwsh
        run: |
          $pkg = "Instalador_Mistica_Presentes"
          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force }
          New-Item -ItemType Directory -Path $pkg | Out-Null
          New-Item -ItemType Directory -Path "$pkg\MisticaPresentes" | Out-Null
          Copy-Item "dist\MisticaPresentes_CORRETO.exe" "$pkg\MisticaPresentes\MisticaPresentes.exe" -Force
          Copy-Item "dist\ServidorMisticaApp" "$pkg\ServidorMisticaApp" -Recurse -Force
          Copy-Item "installer\Instalar_Mistica_Presentes.bat" "$pkg\Instalar_Mistica_Presentes.bat" -Force
          Copy-Item "installer\Atualizar_Mistica_Online.bat" "$pkg\Atualizar_Mistica_Online.bat" -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path $pkg -DestinationPath "Instalador_Mistica_Presentes.zip" -Force

      - name: Criar manifesto de atualizacao
        shell: pwsh
        run: |
          $manifest = @{
            app = "Mistica Presentes"
            status = "online"
            latestVersion = $env:APP_VERSION
            latestBuild = [int]$env:APP_BUILD
            installerFile = "Instalador_Mistica_Presentes.zip"
            releaseTag = "mistica-latest"
            releaseUrl = "https://github.com/${{ github.repository }}/releases/latest"
            downloadUrl = "https://github.com/${{ github.repository }}/releases/download/mistica-latest/Instalador_Mistica_Presentes.zip"
            updatedAt = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
            commit = "${{ github.sha }}"
            message = "Atualizacao automatica gerada pelo GitHub Actions."
          } | ConvertTo-Json -Depth 4
          $manifest | Out-File -FilePath "update-manifest.json" -Encoding utf8

      - name: Publicar artefato do workflow
        uses: actions/upload-artifact@v4
        with:
          name: Instalador_Mistica_Presentes
          path: |
            Instalador_Mistica_Presentes.zip
            update-manifest.json

      - name: Publicar release online sempre atualizada
        uses: ncipollo/release-action@v1
        with:
          tag: mistica-latest
          name: Mistica Presentes - Instalador Online
          body: "Instalador online mais recente gerado automaticamente a partir da branch main."
          artifacts: "Instalador_Mistica_Presentes.zip,update-manifest.json"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
