name: Build Instalador Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.1.${{ github.run_number }}
  APP_BUILD: ${{ github.run_number }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller fastapi uvicorn customtkinter httpx pillow

      - name: Gerar icone xamanico
        shell: pwsh
        run: |
          python scripts/gerar_icone_mistica.py

      - name: Gerar programa principal
        run: |
          python -m PyInstaller --noconfirm MisticaPresentes_CORRETO.spec

      - name: Gerar launcher principal
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "MisticaLauncher" `
            --icon "assets\mistica_xamanico_moderno.ico" `
            --hidden-import sqlite3 `
            --hidden-import _sqlite3 `
            --hidden-import webbrowser `
            --hidden-import random `
            --hidden-import json `
            --hidden-import pathlib `
            --hidden-import threading `
            --hidden-import queue `
            --hidden-import time `
            --hidden-import datetime `
            --hidden-import urllib `
            --hidden-import urllib.request `
            --hidden-import zipfile `
            --hidden-import hashlib `
            --hidden-import tempfile `
            --hidden-import shutil `
            --hidden-import platform `
            --hidden-import struct `
            --hidden-import reports `
            --collect-submodules sqlite3 `
            --collect-submodules reports `
            --add-data "auto_updater.py;." `
            --add-data "app_version.py;." `
            --add-data "release_notes.py;." `
            --add-data "app_runtime_patch.py;." `
            --add-data "app_pagamento_misto_patch.py;." `
            --add-data "app_sync_pagamento_misto_payload_patch.py;." `
            --add-data "app_caixa_fechamento_avancado_patch.py;." `
            --add-data "app_backup_inicializacao_patch.py;." `
            --add-data "app_backup_painel_patch.py;." `
            --add-data "app_manutencao_segura_patch.py;." `
            --add-data "app_sync_status_patch.py;." `
            --add-data "app_painel_guard_patch.py;." `
            --add-data "app_scroll_patch.py;." `
            --add-data "config.py;." `
            --add-data "mistica_presentes.py;." `
            --add-data "database;database" `
            --add-data "repositories;repositories" `
            --add-data "services;services" `
            --add-data "isis;isis" `
            --add-data "reports;reports" `
            --add-data "assets;assets" `
            MisticaLauncher.py

      - name: Gerar servidor do aplicativo
        run: |
          python -m PyInstaller --noconfirm --onedir --console --name ServidorMisticaApp --add-data "backend;backend" --add-data "database;database" --add-data "services;services" --add-data "config.py;." servidor_app.py

      - name: Montar pacote instalador
        shell: pwsh
        run: |
          $pkg = "Instalador_Mistica_Presentes"
          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force }
          New-Item -ItemType Directory -Path $pkg | Out-Null
          New-Item -ItemType Directory -Path "$pkg\MisticaPresentes" | Out-Null
          Copy-Item "dist\MisticaPresentes_CORRETO.exe" "$pkg\MisticaPresentes\MisticaPresentes.exe" -Force
          Copy-Item "dist\MisticaLauncher.exe" "$pkg\MisticaPresentes\MisticaLauncher.exe" -Force
          Copy-Item "assets\mistica_xamanico_moderno.ico" "$pkg\MisticaPresentes\mistica_xamanico_moderno.ico" -Force
          Copy-Item "dist\ServidorMisticaApp" "$pkg\ServidorMisticaApp" -Recurse -Force
          Copy-Item "installer\Instalar_Mistica_Presentes.bat" "$pkg\Instalar_Mistica_Presentes.bat" -Force
          Copy-Item "installer\Atualizar_Mistica_Online.bat" "$pkg\Atualizar_Mistica_Online.bat" -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path $pkg -DestinationPath "Instalador_Mistica_Presentes.zip" -Force

      - name: Criar manifesto de atualizacao
        shell: pwsh
        run: |
          $manifest = @{
            app = "Mística Presentes"
            status = "online"
            latestVersion = $env:APP_VERSION
            latestBuild = [int]$env:APP_BUILD
            installerFile = "Instalador_Mistica_Presentes.zip"
            releaseTag = "mistica-latest"
            releaseUrl = "https://github.com/${{ github.repository }}/releases/latest"
            downloadUrl = "https://github.com/${{ github.repository }}/releases/download/mistica-latest/Instalador_Mistica_Presentes.zip"
            updatedAt = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
            commit = "${{ github.sha }}"
            message = "Atualizacao automatica gerada pelo GitHub Actions."
          } | ConvertTo-Json -Depth 4
          $manifest | Out-File -FilePath "update-manifest.json" -Encoding utf8

      - name: Publicar artefato do workflow
        uses: actions/upload-artifact@v4
        with:
          name: Instalador_Mistica_Presentes
          path: |
            Instalador_Mistica_Presentes.zip
            update-manifest.json

      - name: Publicar release online sempre atualizada
        uses: ncipollo/release-action@v1
        with:
          tag: mistica-latest
          name: Mística Presentes - Instalador Online
          body: "Instalador online mais recente gerado automaticamente a partir da branch main."
          artifacts: "Instalador_Mistica_Presentes.zip,update-manifest.json"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
