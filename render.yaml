services:
  - type: web
    name: misticapresentes-api
    env: python
    # IMPORTANTE: Persistent Disk exige plano pago (Starter ou superior). No
    # plano Free o filesystem é EFÊMERO e o SQLite volta vazio a cada
    # redeploy/sleep/reinício, perdendo pedidos, alunos, liberação de cursos,
    # avaliações e campanhas. Mantenha 'starter' (ou superior) para que o
    # disco abaixo seja provisionado e os dados persistam.
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # Versao validada pela suite desta implementacao. boto3 e cryptography
      # tambem suportam este runtime.
      - key: PYTHON_VERSION
        value: 3.12.11
      # O banco vive no disco persistente montado em /data (ver 'disk' abaixo).
      # config.py::carregar_db_path lê MISTICA_DB_PATH; sem esta variável o
      # padrão cai em ~/Documents (efêmero no Render).
      - key: MISTICA_DB_PATH
        value: /data/mistica_gestao_v20.db
      - key: BACKUP_ENABLED
        value: true
      - key: BACKUP_HOUR
        value: "03"
      - key: BACKUP_MINUTE
        value: "00"
      - key: BACKUP_KEEP
        value: "30"
      - key: BACKUP_DIRECTORY
        value: /data/backups
      - key: BACKUP_TIMEZONE
        value: America/Sao_Paulo
      # Replicacao remota e opt-in: o deploy permanece local-only ate que as
      # credenciais abaixo sejam cadastradas e esta flag seja alterada.
      - key: BACKUP_REMOTE_ENABLED
        value: false
      - key: BACKUP_PROVIDER
        value: r2
      - key: BACKUP_BUCKET
        sync: false
      # Formato: https://<ACCOUNT_ID>.r2.cloudflarestorage.com; regiao S3 auto.
      - key: BACKUP_ENDPOINT
        sync: false
      - key: BACKUP_ACCESS_KEY
        sync: false
      - key: BACKUP_SECRET_KEY
        sync: false
      - key: BACKUP_PREFIX
        sync: false
      # 32 bytes em base64 ou 64 hex. Sem esta chave nao ha restauracao.
      - key: BACKUP_ENCRYPTION_KEY
        sync: false
      - key: BACKUP_UPLOAD_TIMEOUT
        value: "30"
      - key: BACKUP_VERIFY_AFTER_UPLOAD
        value: true
      # Nao ha retencao remota na aplicacao: configure Object Lifecycle Rules
      # no bucket R2, preferencialmente limitadas ao BACKUP_PREFIX.
      #
      # Imagens de produtos enviadas pelo painel (backend/product_image_storage.py).
      # Causa raiz do problema de imagens somem apos deploy: o endpoint de
      # upload gravava em backend/uploads/produtos, dentro do codigo da
      # aplicacao -- fora do disco persistente 'mistica-dados' (mountPath
      # /data, abaixo), esse diretorio e recriado vazio a cada deploy. Ative
      # o storage remoto (S3/R2) preenchendo as variaveis abaixo com um
      # bucket e credenciais PROPRIOS (nao reaproveite BACKUP_*: escopo e
      # prefixo diferentes). Enquanto ficar desativado, o fallback local
      # grava em PRODUCT_IMAGES_LOCAL_DIR -- aponte para o disco persistente
      # (ex.: /data/uploads/produtos) para ao menos sobreviver a reinicios.
      - key: PRODUCT_IMAGES_STORAGE_ENABLED
        value: false
      - key: PRODUCT_IMAGES_BUCKET
        sync: false
      - key: PRODUCT_IMAGES_ENDPOINT
        sync: false
      - key: PRODUCT_IMAGES_REGION
        value: auto
      - key: PRODUCT_IMAGES_ACCESS_KEY_ID
        sync: false
      - key: PRODUCT_IMAGES_SECRET_ACCESS_KEY
        sync: false
      # Dominio publico (custom domain/CDN) que serve o bucket, sem barra final.
      - key: PRODUCT_IMAGES_PUBLIC_BASE_URL
        sync: false
      - key: PRODUCT_IMAGES_PREFIX
        value: produtos
      - key: PRODUCT_IMAGES_UPLOAD_TIMEOUT
        value: "15"
      - key: PRODUCT_IMAGES_LOCAL_DIR
        value: /data/uploads/produtos
      # Rota REST de estorno (POST /api/vendas/{id}/estornar): mantenha false
      # em producao ate a issue #335 ser corrigida (a rota devolve estoque mas
      # nao reverte o lancamento financeiro do caixa original).
      - key: MISTICA_REST_ESTORNO_ENABLED
        value: false
      # Mercado Pago -- pagamento com cartao de credito (backend/mercadopago_*.py).
      # Nenhum valor e sincronizado deste arquivo: cadastre manualmente no
      # dashboard do Render (Environment) as credenciais de PRODUCAO da
      # aplicacao Mercado Pago apos confirmar Public Key e Access Token da
      # MESMA aplicacao/modo no painel do Mercado Pago. Sem essas variaveis
      # configuradas, o cartao de credito permanece indisponivel de forma
      # segura (ver backend/mercadopago_flags.py::mercado_pago_habilitado) --
      # nao ha fallback automatico para credencial de teste.
      - key: MERCADO_PAGO_ENABLED
        sync: false
      # production ou sandbox -- use production neste servico.
      - key: MERCADO_PAGO_ENVIRONMENT
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      # Chave secreta usada para validar a assinatura (x-signature) das
      # notificacoes do webhook (ver secao 6 do PR/relatorio de producao).
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      # Texto exibido na fatura do cartao do comprador (opcional, puramente
      # informativo -- ver backend/mercadopago_flags.py::
      # statement_descriptor_mercadopago). Sem esta variavel configurada, o
      # campo statement_descriptor nunca e enviado ao Mercado Pago (o painel
      # de Qualidade da integracao mostra isso como pendente ate aqui ser
      # preenchido no dashboard do Render).
      - key: MERCADO_PAGO_STATEMENT_DESCRIPTOR
        sync: false
      # Notificacoes administrativas por WhatsApp (backend/whatsapp_*.py,
      # ver docs/admin/WHATSAPP_NOTIFICACOES.md). value: false aqui MANTEM
      # o recurso desligado neste deploy ate a ativacao explicita e
      # controlada descrita no documento citado -- nenhuma das demais
      # variaveis WHATSAPP_* e sincronizada por este arquivo (cadastre
      # manualmente no dashboard do Render quando for ativar).
      - key: WHATSAPP_NOTIFICATIONS_ENABLED
        value: false
      - key: WHATSAPP_PROVIDER
        value: meta_cloud
      - key: WHATSAPP_GRAPH_API_VERSION
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ADMIN_RECIPIENTS
        sync: false
      # Central de Atendimento (mensagens RECEBIDAS de clientes -- ver
      # docs/WHATSAPP_CLOUD_API.md). Recurso SEPARADO das notificacoes acima,
      # reaproveita as mesmas credenciais da Meta (WHATSAPP_PHONE_NUMBER_ID/
      # WHATSAPP_ACCESS_TOKEN/WHATSAPP_APP_SECRET/WHATSAPP_VERIFY_TOKEN acima).
      # value: false aqui mantem o recurso desligado neste deploy.
      - key: WHATSAPP_CLOUD_ENABLED
        value: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_WEBHOOK_MAX_BODY_BYTES
        value: "1048576"
      - key: WHATSAPP_MEDIA_MAX_BYTES
        value: "10485760"
      # Mesmo disco persistente do banco (montado abaixo em /data) -- nunca um
      # diretorio efemero dentro do codigo da aplicacao.
      - key: WHATSAPP_MEDIA_STORAGE_DIR
        value: /data/uploads/whatsapp
      - key: WHATSAPP_MEDIA_RETENTION_DAYS
        value: "90"
      - key: WHATSAPP_WEBHOOK_EVENT_RETENTION_DAYS
        value: "30"
      - key: WHATSAPP_NOTIFICATION_SOUND_ENABLED
        value: true
      - key: WHATSAPP_INBOX_TEMPLATES
        sync: false
    disk:
      name: mistica-dados
      mountPath: /data
      sizeGB: 1
