services:
  - type: web
    name: misticapresentes-api
    env: python
    # IMPORTANTE: Persistent Disk exige plano pago (Starter ou superior). No
    # plano Free o filesystem é EFÊMERO e o SQLite volta vazio a cada
    # redeploy/sleep/reinício, perdendo pedidos, alunos, liberação de cursos,
    # avaliações e campanhas. Mantenha 'starter' (ou superior) para que o
    # disco abaixo seja provisionado e os dados persistam.
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # Versao validada pela suite desta implementacao. boto3 e cryptography
      # tambem suportam este runtime.
      - key: PYTHON_VERSION
        value: 3.12.11
      # O banco vive no disco persistente montado em /data (ver 'disk' abaixo).
      # config.py::carregar_db_path lê MISTICA_DB_PATH; sem esta variável o
      # padrão cai em ~/Documents (efêmero no Render).
      - key: MISTICA_DB_PATH
        value: /data/mistica_gestao_v20.db
      - key: BACKUP_ENABLED
        value: true
      - key: BACKUP_HOUR
        value: "03"
      - key: BACKUP_MINUTE
        value: "00"
      - key: BACKUP_KEEP
        value: "30"
      - key: BACKUP_DIRECTORY
        value: /data/backups
      - key: BACKUP_TIMEZONE
        value: America/Sao_Paulo
      # Replicacao remota e opt-in: o deploy permanece local-only ate que as
      # credenciais abaixo sejam cadastradas e esta flag seja alterada.
      - key: BACKUP_REMOTE_ENABLED
        value: false
      - key: BACKUP_PROVIDER
        value: r2
      - key: BACKUP_BUCKET
        sync: false
      # Formato: https://<ACCOUNT_ID>.r2.cloudflarestorage.com; regiao S3 auto.
      - key: BACKUP_ENDPOINT
        sync: false
      - key: BACKUP_ACCESS_KEY
        sync: false
      - key: BACKUP_SECRET_KEY
        sync: false
      - key: BACKUP_PREFIX
        sync: false
      # 32 bytes em base64 ou 64 hex. Sem esta chave nao ha restauracao.
      - key: BACKUP_ENCRYPTION_KEY
        sync: false
      - key: BACKUP_UPLOAD_TIMEOUT
        value: "30"
      - key: BACKUP_VERIFY_AFTER_UPLOAD
        value: true
      # Nao ha retencao remota na aplicacao: configure Object Lifecycle Rules
      # no bucket R2, preferencialmente limitadas ao BACKUP_PREFIX.
    disk:
      name: mistica-dados
      mountPath: /data
      sizeGB: 1
